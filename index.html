<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Mobilidade Urbana</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --primary: #165DFF;
            --success: #00b894;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-light: #cbd5e1;
            --border: #334155;
            --shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            line-height: 1.6;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease;
        }

        .header h1 {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            color: var(--text-light);
            font-size: 16px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            z-index: 999;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
        }

        .card-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 17px;
        }

        .card-body {
            padding: 20px;
        }

        #map {
            height: 620px;
            width: 100%;
            border-radius: 16px;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .alerts-container {
            height: 400px;
        }

        #alerts-list {
            height: 320px;
            overflow-y: auto;
            padding-right: 6px;
        }

        #alerts-list::-webkit-scrollbar {
            width: 6px;
        }

        #alerts-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .alert-item {
            background: rgba(231, 76, 60, 0.08);
            border-left: 4px solid var(--danger);
            color: var(--text);
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            position: relative;
        }

        .locate-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }

        .locate-btn:hover {
            transform: scale(1.05);
            background: #c0392b;
        }

        .alert-item strong {
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-container {
            height: 320px;
        }

        #speedChart {
            width: 100% !important;
            height: 240px !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>

<body>
    <button class="theme-toggle" id="themeBtn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Plataforma IoT - Monitorização Colaborativa</h1>
        <p>Dashboard em tempo real para mobilidade urbana</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-map-marker-alt"></i> Mapa de Localização
            </div>
            <div class="card-body">
                <div id="map"></div>
            </div>
        </div>

        <div class="side-panel">
            <div class="card alerts-container">
                <div class="card-header">
                    <i class="fas fa-bell"></i> Alertas Recentes
                </div>
                <div class="card-body">
                    <div id="alerts-list">Carregando alertas...</div>
                </div>
            </div>

            <div class="card chart-container">
                <div class="card-header">
                    <i class="fas fa-tachometer-alt"></i> Estatísticas de Velocidade (km/h)
                </div>
                <div class="card-body">
                    <div id="stats-summary" style="display: flex; justify-content: space-around; margin-bottom: 15px; text-align: center;">
                        <div>
                            <div style="font-size: 12px; color: var(--text-light);">MÁXIMA</div>
                            <div id="max-speed" style="font-size: 20px; font-weight: bold; color: var(--danger);">0.0</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: var(--text-light);">MÉDIA</div>
                            <div id="avg-speed" style="font-size: 20px; font-weight: bold; color: var(--primary);">0.0</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: var(--text-light);">TOTAL PONTOS</div>
                            <div id="total-points" style="font-size: 20px; font-weight: bold; color: var(--text);">0</div>
                        </div>
                    </div>
                    <div style="height: 200px;">
                        <canvas id="speedChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // Configurações da API e WebSocket
    const API_BASE_URL = 'http://localhost:8000/api/v1';
    const WS_URL = 'ws://localhost:8000/ws/alerts';
    const API_KEY = 'SeiLa'; // Certifique-se de que é a chave exata do seu .env

    // Função auxiliar para formatar texto (remover underscores e capitalizar)
    function formatText(text) {
        if (!text) return "";
        return text.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    // Alternância entre tema claro e escuro
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    themeBtn.addEventListener('click', () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    });

    // Inicialização do mapa Leaflet
    const map = L.map('map').setView([41.5503, -8.4200], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    const markersLayer = L.layerGroup().addTo(map);

    // Inicialização do gráfico de velocidade (Chart.js)
    const ctx = document.getElementById('speedChart').getContext('2d');
    const speedChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Velocidade (km/h)',
                data: [],
                borderColor: '#165DFF',
                backgroundColor: 'rgba(22, 93, 255, 0.1)',
                borderWidth: 2.5,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true, position: 'top' } },
            scales: { y: { beginAtZero: true }, x: { ticks: { maxRotation: 0 } } }
        }
    });

    // Carrega dados iniciais (sensores e alertas) ao carregar a página
    async function loadInitialData() {
        try {
            // 🚨 CORREÇÃO: Enviando a API_KEY no Header (X-API-Key)
            const resSensor = await fetch(`${API_BASE_URL}/sensors?minutos=10000000000`, {
                method: 'GET',
                headers: { 'X-API-Key': API_KEY }
            });
            const dataSensor = await resSensor.json();
            if (dataSensor.dados) {
                updateMap(dataSensor.dados);
                updateChart(dataSensor.dados);
            }

            // 🚨 CORREÇÃO: Enviando a API_KEY no Header
            const resAlert = await fetch(`${API_BASE_URL}/alerts?minutos=10000000000`, {
                method: 'GET',
                headers: { 'X-API-Key': API_KEY }
            });
            const dataAlert = await resAlert.json();
            if (dataAlert.dados) {
                document.getElementById('alerts-list').innerHTML = '';
                dataAlert.dados.forEach(addAlertToUI);
            }
        } catch (e) {
            console.error("Erro ao carregar dados iniciais:", e);
        }
    }

    // Atualiza os marcadores no mapa com as posições dos dispositivos
    function updateMap(dados) {
        markersLayer.clearLayers();
        dados.forEach(d => {
            const marker = L.circleMarker([d.lat, d.lon], {
                color: '#165DFF',
                fillColor: '#165DFF',
                fillOpacity: 0.7,
                radius: 6
            });
            marker.bindPopup(`
                <div style="font-weight:600">Dispositivo: ${d.device_id}</div>
                <div>Velocidade: ${d.speed} km/h</div>
            `);
            markersLayer.addLayer(marker);
        });
    }

    // Atualiza o gráfico de velocidade com novos dados
    function updateChart(dados) {
        if (!dados || dados.length === 0) return;
        
        const labels = dados.map(d => new Date(d.timestamp).toLocaleTimeString());
        const speeds = dados.map(d => d.speed || 0);

        // Atualiza estatísticas no topo do gráfico
        const maxSpeed = Math.max(...speeds);
        const avgSpeed = speeds.reduce((a, b) => a + b, 0) / speeds.length;
        
        document.getElementById('max-speed').innerText = maxSpeed.toFixed(1);
        document.getElementById('avg-speed').innerText = avgSpeed.toFixed(1);
        document.getElementById('total-points').innerText = speeds.length;

        // Mostra apenas os últimos 12 pontos no gráfico para manter a visualização limpa
        speedChart.data.labels = labels.slice(-12);
        speedChart.data.datasets[0].data = speeds.slice(-12);
        speedChart.update();
    }

    // Adiciona um alerta individual na lista de alertas da interface
    function addAlertToUI(alerta) {
        const listDiv = document.getElementById('alerts-list');
        if (listDiv.innerText === 'Carregando alertas...') listDiv.innerHTML = '';

        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert-item';
        alertDiv.innerHTML = `
            <strong><i class="fas fa-exclamation-triangle"></i> ${formatText(alerta.event_type)}</strong>
            <button class="locate-btn" onclick="locateAlert(${alerta.lat}, ${alerta.lon}, '${alerta.event_type}')">
                <i class="fas fa-map-marker-alt"></i> Localizar
            </button>
            <div style="font-size:13px; margin-top:4px;">
                <div><i class="fas fa-microchip"></i> ID: ${alerta.device_id}</div>
                <div><i class="fas fa-bullseye"></i> Gatilho: ${formatText(alerta.trigger)}</div>
                <div><i class="fas fa-tachometer-alt"></i> Velocidade: ${alerta.speed ? alerta.speed.toFixed(1) : 0} km/h</div>
                <div><i class="fas fa-cube"></i> Accel (X,Y,Z): ${alerta.accel_x ? alerta.accel_x.toFixed(1) : 0}, ${alerta.accel_y ? alerta.accel_y.toFixed(1) : 0}, ${alerta.accel_z ? alerta.accel_z.toFixed(1) : 0}</div>
                <div><i class="fas fa-map-marker-alt"></i> Loc: ${alerta.lat.toFixed(4)}, ${alerta.lon.toFixed(4)}</div>
            </div>
            <div style="font-size:11px; color:var(--text-light); margin-top:6px; text-align:right;">
                <i class="far fa-clock"></i> ${new Date(alerta.timestamp).toLocaleString()}
            </div>
        `;
        listDiv.insertBefore(alertDiv, listDiv.firstChild);
    }

    // Função para localizar o alerta no mapa
    function locateAlert(lat, lon, type) {
        map.setView([lat, lon], 17, { animate: true });
        
        const pulseMarker = L.circleMarker([lat, lon], {
            color: '#e74c3c',
            fillColor: '#e74c3c',
            fillOpacity: 0.8,
            radius: 12
        }).addTo(map)
        .bindPopup(`<div style="color:#e74c3c; font-weight:bold">🚨 LOCAL DO ALERTA</div>${formatText(type)}`)
        .openPopup();

        // Remove o destaque após 5 segundos
        setTimeout(() => map.removeLayer(pulseMarker), 5000);
    }

    // Conexão WebSocket para receber alertas em tempo real
    function connectWebSocket() {
        const ws = new WebSocket(WS_URL);
        
        ws.onopen = () => console.log("✅ WebSocket conectado com sucesso!");
        
        ws.onmessage = (e) => {
            const novoAlerta = JSON.parse(e.data);
            addAlertToUI(novoAlerta);

            L.circleMarker([novoAlerta.lat, novoAlerta.lon], {
                color: '#e74c3c',
                fillColor: '#e74c3c',
                fillOpacity: 0.6,
                radius: 16
            }).addTo(map).bindPopup(`
                <div style="color:#e74c3c; font-weight:bold">🚨 ALERTA!</div>
                ${novoAlerta.event_type}
            `).openPopup();
        };
        
        ws.onclose = () => {
            console.log("❌ WebSocket desconectado. Tentando reconectar em 3 segundos...");
            setTimeout(connectWebSocket, 3000);
        };
    }

    loadInitialData();
    connectWebSocket();

    // Atualiza posições GPS no mapa a cada 30 segundos
    setInterval(async () => {
        try {
            // 🚨 CORREÇÃO: Enviando a API_KEY no Header
            const res = await fetch(`${API_BASE_URL}/sensors?minutos=1`, {
                method: 'GET',
                headers: { 'X-API-Key': API_KEY }
            });
            const data = await res.json();
            if (data.dados) updateMap(data.dados);
        } catch (e) {}
    }, 30000);
</script>
</body>
</html>
